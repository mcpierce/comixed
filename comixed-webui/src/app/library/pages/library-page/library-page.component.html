<mat-toolbar color="accent">
  <button mat-icon-button (click)="onToggleGridView()">
    @if (gridView$.value) {
      <mat-icon>grid_on</mat-icon>
    }
    @if (!gridView$.value) {
      <mat-icon>grid_off</mat-icon>
    }
  </button>
</mat-toolbar>
<cx-comic-data-view
  [comics]="comics"
  [gridView]="gridView$ | async"
></cx-comic-data-view>
