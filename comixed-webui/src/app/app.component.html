<p-toolbar>
  <ng-template #start>
    <p-menubar [model]="menuItems"></p-menubar>
  </ng-template>

  <ng-template #center>
    <strong>ComiXed</strong>
  </ng-template>

  <ng-template #end>
    <p-button [label]="user.email" text />
  </ng-template>
</p-toolbar>

<router-outlet></router-outlet>
